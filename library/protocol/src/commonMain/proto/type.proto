syntax = "proto3";

package blueprint.type;

option java_package = "io.github.numq.blueprint.type";
option java_multiple_files = true;

message DynamicString {
  oneof value {
    string literal = 1;
    string state_key = 2;
  }
}

message DynamicBool {
  oneof value {
    bool literal = 1;
    string state_key = 2;
  }
}

message DynamicFloat {
  oneof value {
    float literal = 1;
    string state_key = 2;
  }
}

message DynamicInt32 {
  oneof value {
    int32 literal = 1;
    string state_key = 2;
  }
}